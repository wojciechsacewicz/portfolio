name: Refresh CRT lockfile

on:
  push:
    branches:
      - feat/threejs-crt-hero
    paths:
      - package.json
      - .github/workflows/refresh-crt-lockfile.yml

permissions:
  contents: write

jobs:
  refresh-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/threejs-crt-hero

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Refresh lockfile
        run: pnpm install --lockfile-only

      - name: Commit lockfile update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: refresh lockfile for Three.js"
          git push origin HEAD:feat/threejs-crt-hero
